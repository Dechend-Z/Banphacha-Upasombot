<!DOCTYPE html>
<html lang="th" data-theme="light" data-font="medium">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="เลือกประเภทการบวช – บวชพระภิกษุหรือบวชสามเณร">
    <meta name="theme-color" content="#8B6B2E">
    <title>เลือกประเภทการบวช – บรรพชาอุปสมบท</title>
    <link rel="manifest" href="pwa/manifest.json">
    <link rel="icon" type="image/svg+xml" href="assets/icons/icon-192.svg">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.svg">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <a href="index.html" class="header-logo">
            <span class="logo-icon">📿</span>
            <span>บรรพชาอุปสมบท</span>
        </a>
        <div class="header-spacer"></div>
        <div class="header-actions">
            <div class="font-size-group">
                <button class="font-btn btn-sm" data-size="small" title="อักษรเล็ก">เล็ก</button>
                <button class="font-btn btn-sm" data-size="medium" title="อักษรกลาง">กลาง</button>
                <button class="font-btn btn-sm" data-size="large" title="อักษรใหญ่">ใหญ่</button>
            </div>
            <button class="btn-icon" id="theme-toggle" title="สลับธีม">🌙</button>
        </div>
    </header>

    <!-- Breadcrumb -->
    <nav class="breadcrumb" id="breadcrumb"></nav>

    <!-- Dhamma Tip -->
    <div id="dhamma-tip"></div>

    <!-- Page Content -->
    <div class="container">
        <div class="page-title">
            <h1 id="type-page-title">เลือกประเภท</h1>
            <p class="subtitle" id="type-page-subtitle">เลือกประเภทการบวช</p>
        </div>

        <div class="selection-grid">
            <div class="selection-card" data-type="monk" id="card-monk">
                <span class="icon">🧘</span>
                <div class="title">บวชพระภิกษุ</div>
                <div class="desc">บทสวดสำหรับผู้จะอุปสมบทเป็นพระภิกษุ</div>
            </div>
            <div class="selection-card" data-type="novice" id="card-novice">
                <span class="icon">🙏</span>
                <div class="title">บวชสามเณร</div>
                <div class="desc">บทสวดสำหรับผู้จะบรรพชาเป็นสามเณร</div>
            </div>
        </div>

        <footer class="footer">
            <p>บรรพชาอุปสมบท — มหานิกาย / ธรรมยุต</p>
            <p>เนื้อหาเพื่อการศึกษาเท่านั้น 🙏</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script src="choose-type.js"></script>
</body>

</html>
